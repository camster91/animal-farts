<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="puffTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d6d3d1"/>
    </linearGradient>
    <linearGradient id="puffBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.25" flood-color="#1f2937"/>
    </filter>
  </defs>

  <!-- background: amber/gold rounded square (the "squircle" app-icon
       shape — 92px corner radius matches iOS app-icon rounding at
       512px scale) -->
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>

  <!-- The classic 💨 emoji is three puffs stacked at slightly
       different sizes, suggesting motion. We draw them with simple
       ellipses (no emoji font dependency — works as a static
       asset everywhere).

       Layout (left to right, smallest to largest):
         small puff top-left:  x≈120, y≈150, rx≈70, ry≈60
         medium puff center:   x≈230, y≈210, rx≈90, ry≈80
         big puff bottom-right: x≈340, y≈290, rx≈110, ry≈100
       Plus 3 motion lines trailing off to the upper-left, fading
       into the background. -->

  <g filter="url(#shadow)">
    <!-- the three puffs. Each is an ellipse with a radial highlight
         to suggest volume. Stacked so they overlap slightly for a
         cohesive cloud shape. -->
    <!-- big puff (right, foreground) -->
    <ellipse cx="340" cy="290" rx="118" ry="100" fill="url(#puffBottom)"/>
    <ellipse cx="340" cy="290" rx="118" ry="100" fill="none" stroke="#a8a29e" stroke-width="2" stroke-opacity="0.4"/>
    <!-- medium puff (center) -->
    <ellipse cx="232" cy="222" rx="90" ry="78" fill="url(#puffBottom)"/>
    <ellipse cx="232" cy="222" rx="90" ry="78" fill="none" stroke="#a8a29e" stroke-width="2" stroke-opacity="0.4"/>
    <!-- small puff (left, background, slightly behind) -->
    <ellipse cx="156" cy="170" rx="64" ry="55" fill="url(#puffTop)"/>
    <ellipse cx="156" cy="170" rx="64" ry="55" fill="none" stroke="#a8a29e" stroke-width="2" stroke-opacity="0.4"/>

    <!-- highlights — small white circles on the top-left of each
         puff to give the volume a glossy, almost 3D feel -->
    <ellipse cx="310" cy="240" rx="34" ry="18" fill="white" fill-opacity="0.45"/>
    <ellipse cx="208" cy="190" rx="22" ry="12" fill="white" fill-opacity="0.45"/>
    <ellipse cx="142" cy="152" rx="14" ry="8"  fill="white" fill-opacity="0.5"/>
  </g>

  <!-- motion lines — three short tapered strokes trailing off to
       the upper-left, fading out. The classic "fart whoosh" vibe. -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="120" y1="120" x2="80"  y2="92"  stroke-width="14"/>
    <line x1="158" y1="100" x2="130" y2="76"  stroke-width="10" opacity="0.7"/>
    <line x1="86"  y1="148" x2="56"  y2="128" stroke-width="11" opacity="0.6"/>
  </g>

  <!-- "card grid" hint in the bottom-right corner: 2×2 small
       rounded squares. Lighter opacity on the back row so the
       front row reads first — the kid sees "this app has a grid
       of stuff" without it being a literal mini-card-grid. -->
  <g transform="translate(340, 384)">
    <rect x="0"  y="0"  width="48" height="48" rx="12" fill="white" fill-opacity="0.5"/>
    <rect x="56" y="0"  width="48" height="48" rx="12" fill="white" fill-opacity="0.85"/>
    <rect x="0"  y="56" width="48" height="48" rx="12" fill="white" fill-opacity="0.85"/>
    <rect x="56" y="56" width="48" height="48" rx="12" fill="white" fill-opacity="0.5"/>
  </g>
</svg>
