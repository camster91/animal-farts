<!doctype html>
<html lang="en">
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Check — Poot Party</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #fbbf24;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 24px;
      }
      h1 { font-size: 24px; color: #1f2937; text-align: center; }
      .btn {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .btn:active { transform: scale(0.97); }
      .btn-mic { background: #ef4444; color: white; }
      .btn-sound { background: #3b82f6; color: white; }
      .btn-idb { background: #10b981; color: white; }
      .result {
        width: 100%;
        max-width: 320px;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-align: center;
        display: none;
      }
      .result.pass { background: #d1fae5; color: #065f46; display: block; }
      .result.fail { background: #fee2e2; color: #991b1b; display: block; }
      .result.waiting { background: #fef3c7; color: #92400e; display: block; }
      .notes {
        max-width: 320px;
        font-size: 13px;
        color: #374151;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>🔧 Android Check</h1>

    <button class="btn btn-mic" id="testMic">Test Microphone</button>
    <div class="result" id="micResult"></div>

    <button class="btn btn-sound" id="testSound">Test Sound Playback</button>
    <div class="result" id="soundResult"></div>

    <button class="btn btn-idb" id="testIdb">Test IndexedDB</button>
    <div class="result" id="idbResult"></div>

    <p class="notes">
      Run on a <strong>real Android device</strong>.<br/>
      Emulator mic does not work.
</p>

    <script>
      // --- Mic test ---
      document.getElementById('testMic').addEventListener('click', async () => {
        const el = document.getElementById('micResult');
        el.className = 'result waiting';
        el.textContent = 'Requesting mic...';
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(t => t.stop());
          el.className = 'result pass';
          el.textContent = '✅ Microphone works!';
        } catch (err) {
          el.className = 'result fail';
          el.textContent = '❌ Mic failed: ' + err.message;
        }
      });

      // --- Sound test ---
      document.getElementById('testSound').addEventListener('click', () => {
        const el = document.getElementById('soundResult');
        el.className = 'result waiting';
        el.textContent = 'Playing...';
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 440;
          gain.gain.value = 0.3;
          osc.start();
          osc.stop(ctx.currentTime + 0.5);
          el.className = 'result pass';
          el.textContent = '✅ Sound plays!';
        } catch (err) {
          el.className = 'result fail';
          el.textContent = '❌ Sound failed: ' + err.message;
        }
      });

      // --- IndexedDB test ---
      document.getElementById('testIdb').addEventListener('click', async () => {
        const el = document.getElementById('idbResult');
        el.className = 'result waiting';
        el.textContent = 'Testing...';
        try {
          const dbs = await new Promise((resolve, reject) => {
            const req = indexedDB.databases ? indexedDB.databases() : Promise.resolve([]);
            if (req.then) req.then(resolve).catch(reject);
            else resolve([]);
          });
          el.className = 'result pass';
          el.textContent = '✅ IndexedDB works! (' + (Array.isArray(dbs) ? dbs.length : 'ok') + ' dbs)';
        } catch (err) {
          el.className = 'result fail';
          el.textContent = '❌ IndexedDB failed: ' + err.message;
        }
      });
    </script>
  </body>
</html>
