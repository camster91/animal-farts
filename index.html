<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PootBox" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PootBox" />
    <meta name="theme-color" content="#fbbf24" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#fbbf24" />
    <meta name="color-scheme" content="light" />
    <!-- Permissions-Policy: explicitly ALLOW microphone for our own origin.
         The Coolify reverse proxy in front of this app sends a
         Permissions-Policy: microphone=() header that blocks all mic
         access. This meta tag (browsers that respect it) plus the
         Permissions API pre-check in JS work around the proxy block.
         See PootBox.tsx startRecording. -->
    <meta http-equiv="Permissions-Policy" content="microphone=(self)" />
    <meta name="description" content="PootBox — a sound toy for kids. Tap an animal card to hear its sound. Change any card's sound from a list, or record your own." />
    <meta name="keywords" content="kids, sounds, sound toy, poot, family, fun, toddler" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- iOS splash screens (iPhone 8, 11, 12, 13, 14, 15 etc) -->
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />

    <title>💨 PootBox</title>
    <style>
      @keyframes pootbox-bubble-tap {
        0% { transform: scale(1); }
        35% { transform: scale(0.85); }
        100% { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
